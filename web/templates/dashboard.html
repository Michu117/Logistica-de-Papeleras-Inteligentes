<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Logística de Contenedores</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>
            Logística de Contenedores
            <span id="last-update"></span>
        </h1>

        <div class="tabs" id="tabs">
            <button class="tab active" data-nodo="todos">Todos</button>
            {% for n in nodos %}
            <button class="tab" data-nodo="{{ n.id }}">{{ n.id }}</button>
            {% endfor %}

        </div>

        <div id="modal-overlay" class="hidden">
            <div class="modal">
                <h3 id="modal-title">Agregar contenedor</h3>
                <input type="text" id="input-nodo-id" placeholder="MAC del ESP32 (ej: AABBCCDDEEFF)" style="background:#16213e;color:#eee">
                <input type="text" id="input-nombre" placeholder="Nombre visible (ej: Contenedor 1)" style="margin-top:8px">
                <input type="text" id="input-lat" placeholder="Latitud (ej: -3.99925)" style="margin-top:8px">
                <input type="text" id="input-lon" placeholder="Longitud (ej: -79.21332)" style="margin-top:8px">
                <input type="text" id="input-ubicacion" placeholder="Dirección / referencia" style="margin-top:8px">
                <div class="modal-actions">
                    <button class="btn-cancel" id="btn-cancel">Cancelar</button>
                    <button class="btn-confirm" id="btn-confirm">Agregar</button>
                </div>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="card">
                <span class="card-label">Total alertas</span>
                <span class="card-value" id="stat-total">{{ stats.total }}</span>
            </div>
            <div class="card">
                <span class="card-label" id="stat2-label">Último nivel máximo</span>
                <span class="card-value" id="stat-max">{{ stats.max_nivel or 0 }}%</span>
            </div>
        </div>

        <div id="summary-grid" class="hidden"></div>

        <div id="toolbar-actions" class="hidden">
            <button id="btn-editar-container" class="btn-editar">✎ Editar contenedor</button>
        </div>

        <div id="status-banner" class="hidden">
            <span id="status-icon">✓</span>
            <span id="status-text">Contenedor normal</span>
            <span id="status-location"></span>
        </div>

        <div id="chart-container" class="hidden">
            <canvas id="nivelChart"></canvas>
        </div>

        <h2>Últimas lecturas <button onclick="actualizar()" class="btn-refresh">↻</button></h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Contenedor</th>
                        <th>Ubicación</th>
                        <th>Fecha</th>
                        <th>Nivel</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="alertas-body"></tbody>
            </table>
        </div>
        <button id="btn-ver-mas" class="btn-ver-mas hidden" onclick="verMas()">Mostrar más</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
    <script>todosNodos = {{ nodos | tojson }}; renderTabs(); setInterval(actualizar, 10000); actualizar();</script>
</body>
</html>
